
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashFusion | Intelligent BI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617; /* Slate 950 */
        color: #e2e8f0; /* Slate 200 - High Contrast */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Refined Void Background - Higher Visibility Blue/Cyan tint */
      .bg-cyber {
        background-color: #020617;
        background-image: 
          radial-gradient(circle at 0% 0%, rgba(34, 211, 238, 0.08) 0%, transparent 50%), /* Cyan top left */
          radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%), /* Indigo top right */
          radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 50%), /* Purple bottom right */
          radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 50%); /* Blue bottom left */
        background-size: 100% 100%;
        background-attachment: fixed;
      }

      /* Cleaner Glass Panel - Higher Contrast Border */
      .glass-panel {
        background: rgba(15, 23, 42, 0.75); /* Darker opacity for better text contrast */
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 8px; /* Slightly wider for access */
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #0f172a;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 10px;
        border: 2px solid #0f172a; /* Creates padding effect */
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #64748b; /* Lighter on hover */
      }
      
      /* Focus visible helper for accessibility */
      :focus-visible {
        outline: 2px solid #22d3ee; /* Cyan-400 */
        outline-offset: 2px;
      }
    </style>
<script type="importmap">
{

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>
</head>
<body class="overflow-hidden bg-cyber">
    <div id="root"></div>
</body>
</html>
